[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (may touch disk/network)
    e2e: End-to-end tests (full pipeline)
    slow: Slow tests (>5s)
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=agent_system
    --cov=aios
    --cov=core
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=0
asyncio_mode = auto
