[pytest]
testpaths =
    tests/test_router.py
    tests/test_evolution_score.py
    tests/test_hexagram.py
    tests/integration
    tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (may touch disk/network, timeout 10s)
    e2e: End-to-end tests (full pipeline, timeout 30s)
    slow: Slow tests (>5s)
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=agent_system
    --cov=aios
    --cov=core
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=0
asyncio_mode = auto
timeout = 30
timeout_method = thread
